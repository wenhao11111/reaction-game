<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>排名第一作者给你100元</title>
<script src="https://imgcache.qq.com/qcloud/tcbjs/1.10.0/tcb.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: background-color 0.1s;
    user-select: none;
    overflow: hidden;
  }

  .waiting { background-color: #4CAF50; }
  .ready   { background-color: #f44336; }
  .idle    { background-color: #4CAF50; }
  .too-early { background-color: #FF9800; }

  #game-area {
    text-align: center;
    color: #fff;
    cursor: pointer;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  #prompt {
    font-size: 2.5rem;
    font-weight: 700;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    margin-bottom: 1rem;
  }

  #result {
    font-size: 1.8rem;
    margin-bottom: 1.5rem;
  }

  #hint {
    font-size: 1rem;
    opacity: 0.8;
  }

  #msg-bar {
    margin-top: 1.2rem;
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  #msg-bar.show {
    opacity: 1;
    pointer-events: auto;
  }

  #msg-input {
    width: 130px;
    padding: 8px 12px;
    font-size: 1rem;
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 8px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    outline: none;
    text-align: center;
  }

  #msg-input::placeholder { color: rgba(255,255,255,0.4); }
  #msg-input:focus { border-color: #fff; }

  #msg-submit {
    padding: 8px 20px;
    font-size: 0.95rem;
    border: none;
    border-radius: 8px;
    background: rgba(255,255,255,0.25);
    color: #fff;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.2s;
  }

  #msg-submit:hover { background: rgba(255,255,255,0.4); }

  /* 排行榜 */
  #leaderboard {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.55);
    border-radius: 12px;
    padding: 16px 20px;
    min-width: 300px;
    color: #fff;
    backdrop-filter: blur(6px);
  }

  #leaderboard h3 {
    font-size: 1rem;
    margin-bottom: 10px;
    text-align: center;
    letter-spacing: 2px;
  }

  .lb-header {
    display: grid;
    grid-template-columns: 24px 70px 1fr 70px;
    gap: 4px;
    font-size: 0.8rem;
    opacity: 0.5;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    margin-bottom: 6px;
    text-align: center;
  }

  #leaderboard ol {
    list-style: none;
  }

  #leaderboard li {
    padding: 5px 0;
    font-size: 0.95rem;
    display: grid;
    grid-template-columns: 24px 70px 1fr 70px;
    align-items: center;
    gap: 4px;
  }

  #leaderboard li .lb-rank { font-weight: 700; text-align: center; }
  #leaderboard li .lb-name { flex-shrink: 0; }
  #leaderboard li .lb-msg {
    text-align: center;
    opacity: 0.6;
    font-size: 0.85rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #leaderboard li .lb-time { text-align: right; }

  .best { color: #FFD700; font-weight: 700; }

  #leaderboard .empty {
    text-align: center;
    opacity: 0.6;
    font-size: 0.85rem;
    display: block;
  }

  .best { color: #FFD700; font-weight: 700; }

  /* 登录界面 */
  #login-screen {
    position: fixed;
    inset: 0;
    background: #2c3e50;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 100;
  }

  #login-screen.hidden { display: none; }

  #login-box {
    text-align: center;
    color: #fff;
  }

  #login-box h1 {
    font-size: 2.2rem;
    margin-bottom: 0.5rem;
  }

  #login-box p {
    opacity: 0.7;
    margin-bottom: 2rem;
    font-size: 1rem;
  }

  #login-box input {
    display: block;
    width: 260px;
    margin: 0 auto 1rem;
    padding: 12px 16px;
    font-size: 1.1rem;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    outline: none;
    text-align: center;
    transition: border-color 0.2s;
  }

  #login-box input::placeholder { color: rgba(255,255,255,0.4); }
  #login-box input:focus { border-color: #4CAF50; }

  #login-box button {
    padding: 12px 40px;
    font-size: 1.1rem;
    border: none;
    border-radius: 8px;
    background: #4CAF50;
    color: #fff;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.2s;
  }

  #login-box button:hover { background: #43A047; }

  #player-tag {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(0,0,0,0.55);
    border-radius: 12px;
    padding: 8px 16px;
    color: #fff;
    font-size: 0.95rem;
    backdrop-filter: blur(6px);
  }

  #player-tag .name { font-weight: 700; color: #4CAF50; }

  #game-title {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    text-align: center;
    padding: 18px 0 14px;
    font-size: 1.6rem;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    letter-spacing: 3px;
    z-index: 50;
    pointer-events: none;
  }
</style>
</head>
<body class="idle">

<div id="login-screen">
  <div id="login-box">
    <h1 style="font-size:2.8rem;letter-spacing:4px;text-shadow:0 3px 16px rgba(0,0,0,0.3)">排名第一作者给你100元</h1>
    <p>请输入金山员工真实姓名，否则影响奖励发放</p>
    <input type="text" id="username-input" placeholder="请输入用户名" maxlength="12" autofocus>
    <button id="start-btn">开始游戏</button>
  </div>
</div>

<div id="game-title" style="display:none">排名第一作者给你100元</div>
<div id="player-tag">玩家: <span class="name" id="player-name"></span></div>

<div id="game-area">
  <div id="prompt">点击屏幕开始</div>
  <div id="result"></div>
  <div id="hint">当屏幕变红时，尽快点击！</div>
  <div id="msg-bar">
    <input type="text" id="msg-input" placeholder="留一句话（6字内）" maxlength="6">
    <button id="msg-submit">提交</button>
  </div>
</div>

<div id="leaderboard">
  <h3>排行榜</h3>
  <div style="text-align:center;font-size:0.8rem;opacity:0.7;margin-bottom:8px;color:#FFD700">海选截止：5月13日</div>
  <div class="lb-header"><span>#</span><span>姓名</span><span>留言</span><span>成绩</span></div>
  <ol id="rank-list">
    <li class="empty">暂无记录</li>
  </ol>
</div>

<script>
(function () {
  // ── DOM 引用 ──
  const loginScreen = document.getElementById('login-screen');
  const usernameInput = document.getElementById('username-input');
  const startBtn = document.getElementById('start-btn');
  const playerName = document.getElementById('player-name');
  const gameTitle  = document.getElementById('game-title');
  const gameArea  = document.getElementById('game-area');
  const prompt    = document.getElementById('prompt');
  const result    = document.getElementById('result');
  const hint      = document.getElementById('hint');
  const rankList  = document.getElementById('rank-list');
  const msgBar    = document.getElementById('msg-bar');
  const msgInput  = document.getElementById('msg-input');
  const msgSubmit = document.getElementById('msg-submit');

  msgBar.addEventListener('click', function(e) { e.stopPropagation(); });

  // ── 腾讯云开发初始化 ──
  const TCB_ENV = 'gametest-d8g5907rw10144441';
  let db = null;
  let cloudReady = false;

  (async function initCloud() {
    try {
      console.log('[TCB] 开始初始化...');
      const app = tcb.init({ env: TCB_ENV, source: 'static' });
      await app.auth().anonymousAuthProvider().signIn();
      console.log('[TCB] 匿名登录成功');
      db = app.database();
      cloudReady = true;
      console.log('[TCB] 云端连接成功');
      if (currentUser) loadLeaderboard();
    } catch (e) {
      console.error('[TCB] 云端连接失败:', e);
    }
  })();

  const MAX_RECORDS = 10;
  let records = JSON.parse(localStorage.getItem('reaction-records') || '[]');
  if (records.length > 0 && typeof records[0] === 'number') {
    records = [];
    localStorage.setItem('reaction-records', '[]');
  }
  records.forEach(r => { if (!r.msg) r.msg = ''; });
  let currentUser = '';
  let lastElapsed = 0;

  // ── 登录 ──
  startBtn.addEventListener('click', doLogin);
  usernameInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') doLogin();
  });

  function doLogin() {
    const name = usernameInput.value.trim();
    if (!name) {
      usernameInput.style.borderColor = '#f44336';
      usernameInput.focus();
      return;
    }
    currentUser = name;
    playerName.textContent = name;
    loginScreen.classList.add('hidden');
    gameTitle.style.display = 'block';
    loadLeaderboard();
  }

  async function loadLeaderboard() {
    if (cloudReady) {
      try {
        const res = await db.collection('leaderboard').orderBy('time', 'asc').limit(MAX_RECORDS).get();
        if (res.data && res.data.length > 0) {
          records = res.data.map(r => ({ name: r.name, time: r.time, msg: r.msg || '' }));
          localStorage.setItem('reaction-records', JSON.stringify(records));
        }
      } catch (e) {
        console.error('[TCB] 加载排行榜失败:', e);
      }
    }
    renderLeaderboard();
  }

  // ── 游戏逻辑 ──
  let state = 'idle';
  let greenTime = 0;
  let timeoutId = null;

  gameArea.addEventListener('click', handleClick);

  function handleClick() {
    if (state === 'idle') {
      startWaiting();
    } else if (state === 'waiting') {
      tooEarly();
    } else if (state === 'ready') {
      recordReaction();
    } else if (state === 'too-early') {
      startWaiting();
    }
  }

  function startWaiting() {
    state = 'waiting';
    document.body.className = 'waiting';
    prompt.textContent = '等待变红...';
    result.textContent = '';
    hint.textContent = '不要点击！等屏幕变红';
    msgBar.classList.remove('show');

    const delay = 1500 + Math.random() * 3500;
    timeoutId = setTimeout(() => {
      state = 'ready';
      document.body.className = 'ready';
      greenTime = performance.now();
      prompt.textContent = '点击！';
      hint.textContent = '';
    }, delay);
  }

  function tooEarly() {
    clearTimeout(timeoutId);
    state = 'too-early';
    document.body.className = 'too-early';
    prompt.textContent = '太早了！';
    result.textContent = '';
    hint.textContent = '点击屏幕重新开始';
  }

  function recordReaction() {
    const elapsed = Math.round(performance.now() - greenTime);
    state = 'idle';
    document.body.className = 'idle';

    prompt.textContent = '点击屏幕再来一次';
    result.textContent = elapsed + ' ms';
    hint.textContent = getComment(elapsed);

    lastElapsed = elapsed;
    msgBar.classList.add('show');
    msgInput.value = '';
    msgInput.focus();
  }

  // ── 提交留言 ──
  msgSubmit.addEventListener('click', function(e) { e.stopPropagation(); submitMsg(); });
  msgInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') { e.preventDefault(); submitMsg(); }
  });
  msgInput.addEventListener('click', function(e) { e.stopPropagation(); });

  function submitMsg() {
    const msg = msgInput.value.trim();
    saveRecord(lastElapsed, msg);
    msgBar.classList.remove('show');
  }

  function getComment(ms) {
    if (ms < 150)  return '闪电般的反应！';
    if (ms < 250)  return '非常快！';
    if (ms < 350)  return '不错！';
    if (ms < 500)  return '还可以，再试试？';
    return '加油，你可以更快！';
  }

  // ── 保存 & 同步 ──
  function saveRecord(ms, msg) {
    const existing = records.find(r => r.name === currentUser);
    if (existing) {
      if (ms < existing.time) {
        existing.time = ms;
        existing.msg = msg;
      }
    } else {
      records.push({ name: currentUser, time: ms, msg: msg });
    }
    records.sort((a, b) => a.time - b.time);
    if (records.length > MAX_RECORDS) records.length = MAX_RECORDS;
    localStorage.setItem('reaction-records', JSON.stringify(records));
    renderLeaderboard();

    syncToCloud(ms, msg);
  }

  async function syncToCloud(ms, msg) {
    if (!cloudReady) return;
    try {
      const col = db.collection('leaderboard');
      const res = await col.where({ name: currentUser }).get();
      if (res.data && res.data.length > 0) {
        const doc = res.data[0];
        if (ms < doc.time) {
          await col.doc(doc._id).update({ time: ms, msg: msg });
        }
      } else {
        await col.add({ name: currentUser, time: ms, msg: msg });
      }
      await loadLeaderboard();
    } catch (e) {
      console.error('[TCB] 同步失败:', e);
    }
  }

  function renderLeaderboard() {
    if (records.length === 0) {
      rankList.innerHTML = '<li class="empty">暂无记录</li>';
      return;
    }
    rankList.innerHTML = records.map((r, i) => {
      const cls = i === 0 ? ' class="best"' : '';
      const highlight = r.name === currentUser ? ' style="color:#81C784"' : '';
      const msg = r.msg || '';
      return `<li${cls}><span class="lb-rank">${i + 1}</span><span class="lb-name"${highlight}>${r.name}</span><span class="lb-msg">${msg}</span><span class="lb-time">${r.time} ms</span></li>`;
    }).join('');
  }
})();
</script>
</body>
</html>
